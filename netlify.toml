[build]
  command       = "npm run build"
  publish       = "dist"
  functions     = "netlify/functions"

[functions]
  external_node_modules = []
  node_bundler          = "esbuild"

[functions."discover"]
  timeout = 60

[dev]
  command       = "npm run dev"
  port          = 8888
  targetPort    = 5173
  autoLaunch    = false

# Redirect all non-asset requests to index.html (SPA routing)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
